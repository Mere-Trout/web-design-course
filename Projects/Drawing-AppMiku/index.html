<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Miku Drawing App</title>
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="top-bar">
    <img src="nameHatsune.png" class="miku-logo">
</div>

<div class="container">
    
    <div class="canvas-wrapper">
        <canvas id="drawCanvas" width="600" height="400"></canvas>

        <div class="toolbar">
            <div class="colors">
                <button class="color" data-color="#000000" style="background:#000000;"></button>
                <button class="color" data-color="#39c5bb" style="background:#39c5bb;"></button>
                <button class="color" data-color="#ff4fa3" style="background:#ff4fa3;"></button>
                <button class="color" data-color="#ffffff" style="background:#ffffff; border:1px solid #ccc;"></button>
            </div>

            <div class="tools">
                <button id="eraser">Eraser</button>
                <button id="clear">Clear</button>
            </div>
        </div>
    </div>

    <img class="miku-sit" src="mikusit.png">

</div>

<script src="script.js"></script>

</body>

</html>
